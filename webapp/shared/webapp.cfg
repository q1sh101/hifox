// webapp.cfg - shared webapp behavior, per-app overrides
// main browser profile skips everything here - isWebapp stays false.

try {
  let profileDir = Services.dirsvc.get("ProfD", Ci.nsIFile).leafName;
  lockPref("_autoconfig.profile", profileDir);
  let isWebapp = false;

  // --- per-webapp overrides ---

  // --- shared webapp behavior ---
  if (isWebapp) {
    let debugWebapp = false; // true -> deploy -> Ctrl+Shift+Alt+I

    lockPref("browser.startup.page", 0);
    lockPref("browser.tabs.closeWindowWithLastTab", false);
    lockPref("browser.tabs.tabmanager.enabled", false);
    lockPref("reader.parse-on-load.enabled", false);
    lockPref("browser.urlbar.suggest.bookmark", false);
    lockPref("browser.urlbar.suggest.history", false);
    lockPref("browser.urlbar.suggest.openpage", false);
    lockPref("browser.urlbar.suggest.engines", false);
    lockPref("browser.urlbar.maxRichResults", 0);

    if (debugWebapp) {
      lockPref("devtools.policy.disabled", false);
      lockPref("devtools.chrome.enabled", true);
      lockPref("devtools.debugger.remote-enabled", true);
      lockPref("devtools.toolbox.host", "window");
    } else {
      lockPref("devtools.policy.disabled", true);
    }

    Services.obs.addObserver({
      observe: function(subject, topic) {
        let win = subject;

        win.addEventListener("load", function() {
          win.setTimeout(function() {
            let doc = win.document;

            // cleanup pinned tabs from previous config
            if (win.gBrowser) {
              for (let tab of win.gBrowser.tabs) {
                if (tab.pinned) win.gBrowser.unpinTab(tab);
              }
            }

            let keys = [
              "key_close",
              "key_newNavigator",
              "key_newNavigatorTab",
              "key_undoCloseTab",
              "key_undoCloseWindow",
              "key_openLocation",
              "key_search",
              "key_gotoHistory",
              "key_bookmarkThisPage",
              "viewBookmarksSidebarKb",
              "key_openDownloads",
              "openFileKb",
              "key_savePage",
              "printKb",
              "key_viewSource",
              "key_viewInfo",
              "key_openAddons",
              "key_privatebrowsing",
              "key_screenshot",
              "key_sanitize",
              "bookmarkAllTabsKb",
              "key_aboutProcesses",
            ];
            if (!debugWebapp) {
              keys.push(
                "key_toggleToolboxF12",
                "key_toggleToolbox",
                "key_inspector",
                "key_webconsole",
                "key_netmonitor",
                "key_browserToolbox",
                "key_browserConsole",
                "key_responsiveDesignMode"
              );
            }

            for (let id of keys) {
              let el = doc.getElementById(id);
              if (el) {
                el.removeAttribute("command");
                el.removeAttribute("key");
                el.removeAttribute("modifiers");
                el.removeAttribute("oncommand");
                el.setAttribute("disabled", "true");
              }
            }

            // e.code = physical key, layout-independent
            win.addEventListener("keydown", function(e) {
              let c = e.code;
              let dominated = false;

              // Ctrl+W: protect first tab, close others
              if (e.ctrlKey && !e.shiftKey && !e.altKey && c === "KeyW") {
                if (win.gBrowser && win.gBrowser.selectedTab !== win.gBrowser.tabs[0]) {
                  win.gBrowser.removeTab(win.gBrowser.selectedTab);
                }
                dominated = true;
              }

              if (e.ctrlKey && !e.shiftKey && !e.altKey && /^Key[NTLKHDJOSPUI]$/.test(c)) {
                dominated = true;
              }

              if (e.ctrlKey && e.shiftKey && !e.altKey) {
                if (/^Key[ABDNPSTWX]$/.test(c) || e.key === "Delete") dominated = true;
                if (!debugWebapp && /^Key[CEIJKM]$/.test(c)) dominated = true;
              }

              if (!debugWebapp && e.ctrlKey && e.shiftKey && e.altKey && c === "KeyI") dominated = true;

              if (/^(F6|F10)$/.test(e.key)) dominated = true;

              if (!debugWebapp) {
                if (e.key === "F12") dominated = true;
                if (e.shiftKey && !e.ctrlKey && /^(F5|F7|F9)$/.test(e.key)) dominated = true;
              }

              if (e.shiftKey && !e.ctrlKey && e.key === "Escape") dominated = true;

              if (e.altKey && !e.ctrlKey && (c === "KeyD" || /^(ArrowLeft|ArrowRight|Home)$/.test(e.key))) {
                dominated = true;
              }

              if (dominated) {
                e.preventDefault();
                e.stopImmediatePropagation();
              }
            }, true);

          }, 200);
        }, { once: true });
      }
    }, "domwindowopened");
  }
} catch(e) {
  lockPref("_autoconfig.error", "" + e);
}

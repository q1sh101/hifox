// --- Discord-specific overrides (base locks these, relaxed here for functionality) ---
lockPref("dom.webnotifications.enabled", true);      // message notifications
lockPref("dom.webaudio.enabled", true);              // voice processing (echo cancellation, noise suppression)
lockPref("media.autoplay.default", 0);               // allow autoplay (voice/video calls)
lockPref("media.getdisplaymedia.enabled", true);     // screen sharing
lockPref("media.getusermedia.screensharing.enabled", true); // screen sharing (legacy, still needed)
lockPref("media.navigator.enabled", true);           // camera/mic API
lockPref("media.peerconnection.enabled", true);      // WebRTC voice/video
lockPref("privacy.resistFingerprinting", false);     // RFP breaks screen sharing (spoofs resolution -> black screen)
lockPref("javascript.options.wasm", true);           // screen share encoding pipeline (error 2007 without this)
lockPref("webgl.disabled", false);                   // needed for WebRTC video encoding
lockPref("widget.use-xdg-desktop-portal.file-picker", 0); // use direct chooser so uploads don't depend on the document portal mount
lockPref("permissions.default.microphone", 0);       // allow mic permission prompt
lockPref("permissions.default.camera", 0);           // allow camera permission prompt

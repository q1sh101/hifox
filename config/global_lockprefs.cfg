// global_lockprefs.cfg - pref-side of policies.json hardening
//
// every pref here is locked with lockPref() - the highest priority level.
// browser, extensions, and websites cannot override these values.
// this file defines the global lockPref baseline.
//
//
// edit -> restart Firefox -> locked.

lockPref("_autoconfig.loaded", true);

// --- devtools (debug toggle) ---
let debugBrowser = false;
lockPref("devtools.chrome.enabled", debugBrowser);
lockPref("devtools.debugger.force-local", true);
lockPref("devtools.debugger.remote-enabled", debugBrowser);
lockPref("devtools.policy.disabled", false);

// --- browser.* ---
lockPref("browser.contentanalysis.default_result", 0);
lockPref("browser.contentanalysis.enabled", false);
lockPref("browser.contentblocking.category", "strict");
lockPref("browser.download.useDownloadDir", true);
lockPref("browser.formfill.enable", false);
lockPref("browser.ml.chat.enabled", false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.addons", false);
lockPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.features", false);
lockPref("browser.newtabpage.activity-stream.feeds.section.highlights", false);
lockPref("browser.newtabpage.activity-stream.feeds.section.topstories", false);
lockPref("browser.newtabpage.activity-stream.feeds.topsites", false);
lockPref("browser.newtabpage.activity-stream.showSearch", true);
lockPref("browser.newtabpage.activity-stream.showSponsored", false);
lockPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
lockPref("browser.newtabpage.enabled", true);
lockPref("browser.search.suggest.enabled", false);
lockPref("browser.shell.checkDefaultBrowser", false);
lockPref("browser.startup.homepage", "about:home");
lockPref("browser.startup.page", 1);
lockPref("browser.translations.enable", false);
lockPref("browser.urlbar.suggest.quicksuggest.nonsponsored", false);
lockPref("browser.urlbar.suggest.quicksuggest.sponsored", false);
lockPref("browser.urlbar.suggest.searches", false);

// --- datareporting.* ---
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("datareporting.usage.uploadEnabled", false);

// --- dom.* ---
lockPref("dom.security.https_only_mode", true);

// --- extensions.* ---
lockPref("extensions.formautofill.addresses.enabled", false);
lockPref("extensions.formautofill.creditCards.enabled", false);
lockPref("extensions.screenshots.disabled", true);

// --- general.* ---
lockPref("general.aboutConfig.enable", false);

// --- identity.* ---
lockPref("identity.fxaccounts.enabled", false);

// --- media.* ---
lockPref("media.autoplay.default", 5);
lockPref("media.eme.enabled", false);

// --- network.* ---
lockPref("network.captive-portal-service.enabled", false);
lockPref("network.cookie.cookieBehavior", 5);
lockPref("network.dns.disablePrefetch", true);
lockPref("network.dns.disablePrefetchFromHTTPS", true);
lockPref("network.proxy.socks_remote_dns", true);
lockPref("network.proxy.type", 5);
lockPref("network.trr.mode", 5); // DoH off - VPN handles DNS

// --- permissions.* ---
lockPref("permissions.default.camera", 2);
lockPref("permissions.default.desktop-notification", 2);
lockPref("permissions.default.geo", 2);
lockPref("permissions.default.microphone", 2);
lockPref("permissions.default.xr", 2);

// --- privacy.* ---
lockPref("privacy.clearOnShutdown_v2.browsingHistoryAndDownloads", false);
lockPref("privacy.clearOnShutdown_v2.cache", true);
lockPref("privacy.clearOnShutdown_v2.cookiesAndStorage", false);
lockPref("privacy.clearOnShutdown_v2.downloads", true);
lockPref("privacy.clearOnShutdown_v2.formdata", true);
lockPref("privacy.sanitize.sanitizeOnShutdown", true);
lockPref("privacy.trackingprotection.cryptomining.enabled", true);
lockPref("privacy.trackingprotection.enabled", true);
lockPref("privacy.trackingprotection.fingerprinting.enabled", true);
lockPref("privacy.trackingprotection.socialtracking.enabled", true);

// --- security.* ---
lockPref("security.ssl3.deprecated.rsa_des_ede3_sha", false);
lockPref("security.ssl3.rsa_aes_128_gcm_sha256", false);
lockPref("security.ssl3.rsa_aes_128_sha", false);
lockPref("security.ssl3.rsa_aes_256_gcm_sha384", false);
lockPref("security.ssl3.rsa_aes_256_sha", false);

// --- signon.* ---
lockPref("signon.rememberSignons", false);

// --- toolkit.* ---
lockPref("toolkit.legacyUserProfileCustomizations.stylesheets", true);
lockPref("toolkit.telemetry.archive.enabled", false);

// --- ui defaults: seed theme early, seed sidebar after browser UI startup ---
try {
  if (!Services.prefs.getBoolPref("_hifox.ui_seeded", false)) {
    let _obs = {
      observe(subject) {
        if (!subject || subject.location?.href !== "chrome://browser/content/browser.xhtml") return;
        Services.obs.removeObserver(_obs, "browser-delayed-startup-finished");
        try {
          const _p = Services.prefs;
          _p.setBoolPref("sidebar.revamp", true);
          _p.setBoolPref("sidebar.verticalTabs", true);
          _p.setStringPref("sidebar.visibility", "always-show");
          _p.setBoolPref("sidebar.revamp.defaultLauncherVisible", true);
          _p.setBoolPref("_hifox.ui_seeded", true);
        } catch(e) {
          try { Services.prefs.setStringPref("_hifox.error.ui_seed", String(e)); } catch(_) {}
        }
      }
    };
    Services.obs.addObserver(_obs, "browser-delayed-startup-finished");
  }

  if (!Services.prefs.getBoolPref("_hifox.alpenglow_seeded", false)) {
    Services.prefs.setStringPref("extensions.activeThemeID", "firefox-alpenglow@mozilla.org");
    Services.prefs.setBoolPref("_hifox.alpenglow_seeded", true);
  }
} catch(e) {
  try { Services.prefs.setStringPref("_hifox.error.seed_block", String(e)); } catch(_) {}
}

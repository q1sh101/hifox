// generate_pref_dump.cfg - full Firefox pref dump
//
// about:config is blocked by hardening. this replaces it.
// runs at Firefox startup, AFTER all lockPrefs are applied.
// enumerates every pref with its current value and lock status.
//
// output: <profile>/generated_pref_dump.txt (written automatically on startup)
// usage:  restart Firefox -> verify auto-copies to repo -> git diff config/generated_pref_dump.txt
//
// why: Firefox updates silently introduce new prefs with new defaults.
// diff between old and new dump reveals exactly what changed.
// no about:config needed - full visibility from one file.


try {
  var _pb = Components.classes["@mozilla.org/preferences-service;1"]
             .getService(Components.interfaces.nsIPrefBranch);
  var _all = _pb.getChildList("", {});
  var _out = [];
  // per-session noise: timestamps, UUIDs, counters - zero informational value
  // keep: version numbers, feature flags, policy settings, security prefs
  var _skip = [
    // timestamps (per-session)
    "app.update.lastUpdateTime.",
    "browser.laterrun.bookkeeping.profileCreationTime",
    "browser.region.update.updated",
    "browser.safebrowsing.provider.google5.lastupdatetime",
    "browser.safebrowsing.provider.google5.nextupdatetime",
    "browser.safebrowsing.provider.mozilla.lastupdatetime",
    "browser.safebrowsing.provider.mozilla.nextupdatetime",
    "browser.startup.lastColdStartupCheck",
    "browser.urlbar.lastUrlbarSearchSeconds",
    "captchadetection.lastSubmission",
    "datareporting.policy.dataSubmissionPolicyNotifiedTime",
    "extensions.getAddons.cache.lastUpdate",
    "idle.lastDailyNotification",
    "media.gmp-gmpopenh264.last",
    "media.gmp-manager.buildID",
    "media.gmp-manager.lastCheck",
    "media.gmp-manager.lastEmptyCheck",
    "places.database.lastMaintenance",
    "toolkit.startup.last_success",
    // UUIDs (per-profile random identifiers)
    "_autoconfig.profile",
    "app.normandy.user_id",
    "browser.contextual-services.contextId",
    "browser.newtabpage.activity-stream.impressionId",
    "dom.push.userAgentID",
    "extensions.webextensions.uuids",
    "nimbus.profileId",
    "toolkit.profiles.storeID",
    // counters & volatile server-pushed data
    "browser.newtabpage.activity-stream.discoverystream.sections.interestPicker",
    "browser.newtabpage.trainhopAddon",
    "browser.search.serpMetricsRecordedCounter",
    "browser.search.totalSearches",
    "browser.urlbar.quickactions.timesShownOnboardingLabel",
    "extensions.quarantinedDomains.list",
    "privacy.sanitize.pending",
    "services.settings."
  ];
  for (var i = 0; i < _all.length; i++) {
    var _n = _all[i];
    var _s = false;
    for (var j = 0; j < _skip.length; j++) {
      if (_n.indexOf(_skip[j]) === 0) { _s = true; break; }
    }
    if (_s) continue;
    var _t = _pb.getPrefType(_n);
    var _v = "";
    try {
      if (_t === 32) _v = _pb.getCharPref(_n);
      else if (_t === 64) _v = _pb.getIntPref(_n);
      else if (_t === 128) _v = _pb.getBoolPref(_n);
    } catch(e) { _v = "?"; }
    var _l = _pb.prefIsLocked(_n) ? " [LOCKED]" : "";
    _out.push(_n + " = " + _v + _l);
  }
  _out.sort();
  var _profDir = Services.dirsvc.get("ProfD", Components.interfaces.nsIFile);
  _profDir.append("generated_pref_dump.txt");
  var _fos = Components.classes["@mozilla.org/network/file-output-stream;1"]
               .createInstance(Components.interfaces.nsIFileOutputStream);
  _fos.init(_profDir, 0x02 | 0x08 | 0x20, 0o644, 0);
  var _data = _out.join("\n");
  _fos.write(_data, _data.length);
  _fos.close();
  pref("_hifox.pref_dump_error", "");
  lockPref("_hifox.pref_dump", _out.length + " prefs -> " + _profDir.path);
} catch(e) {
  pref("_hifox.pref_dump_error", "" + e);
}
